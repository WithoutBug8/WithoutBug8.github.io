{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#ffffff"/>

<style>
  .page__content .home-hero {
    margin: 0 0 2.5rem;
    padding: 2rem;
    border: 1px solid rgba(39, 76, 119, 0.14);
    border-radius: 24px;
    background:
      radial-gradient(circle at top right, rgba(69, 123, 157, 0.16), transparent 32%),
      linear-gradient(135deg, rgba(248, 249, 250, 0.98), rgba(232, 241, 248, 0.96));
    box-shadow: 0 22px 60px rgba(39, 76, 119, 0.08);
  }

  .page__content .home-hero__eyebrow {
    display: inline-block;
    margin-bottom: 0.8rem;
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
    background: rgba(69, 123, 157, 0.12);
    color: #274c77;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .page__content .home-hero__title {
    margin: 0 0 0.8rem;
    font-size: 2.4rem;
    line-height: 1.1;
  }

  .page__content .home-hero__lead {
    max-width: 42rem;
    margin: 0;
    color: #355070;
    font-size: 1.05rem;
  }

  .page__content .quick-facts {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin: 1.75rem 0 0;
  }

  .page__content .quick-facts__item {
    padding: 1rem 1.1rem;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.72);
    border: 1px solid rgba(39, 76, 119, 0.1);
  }

  .page__content .quick-facts__label {
    display: block;
    margin-bottom: 0.25rem;
    color: #5c677d;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .page__content .quick-facts__value {
    color: #1d3557;
    font-weight: 700;
  }

  .page__content .news-list {
    display: grid;
    gap: 1rem;
    margin-top: 1rem;
  }

  .page__content .news-card {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    padding: 1rem 1.1rem;
    border-left: 4px solid #457b9d;
    border-radius: 0 18px 18px 0;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(241, 248, 252, 0.98));
    box-shadow: 0 12px 30px rgba(39, 76, 119, 0.08);
  }

  .page__content .news-card--highlight {
    border-left-color: #d4a373;
    background: linear-gradient(135deg, rgba(255, 250, 244, 0.98), rgba(255, 245, 235, 0.95));
  }

  .page__content .news-card__title {
    margin: 0;
    color: #1d3557;
    font-weight: 700;
  }

  .page__content .news-card__date {
    flex-shrink: 0;
    color: #5c677d;
    font-size: 0.95rem;
    white-space: nowrap;
  }

  .page__content .icon-links {
    display: flex;
    flex-wrap: wrap;
    gap: 0.9rem;
    margin-top: 2rem;
  }

  .page__content .icon-links__item {
    display: inline-flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.85rem 1rem;
    border: 1px solid rgba(39, 76, 119, 0.1);
    border-radius: 999px;
    background: #fff;
    color: #1d3557;
    text-decoration: none;
    box-shadow: 0 12px 30px rgba(39, 76, 119, 0.05);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }

  .page__content .icon-links__item:hover {
    transform: translateY(-3px);
    border-color: rgba(69, 123, 157, 0.35);
    box-shadow: 0 18px 36px rgba(39, 76, 119, 0.1);
  }

  .page__content .icon-links__item i {
    font-size: 1rem;
    color: #457b9d;
  }

  .page__content .icon-links__item span {
    font-size: 0.95rem;
    font-weight: 700;
  }

  @media (max-width: 768px) {
    .page__content .home-hero {
      padding: 1.4rem;
      border-radius: 20px;
    }

    .page__content .home-hero__title {
      font-size: 1.9rem;
    }

    .page__content .news-card {
      flex-direction: column;
    }

    .page__content .news-card__date {
      white-space: normal;
    }
  }
</style>

<!-- end custom head snippets -->
